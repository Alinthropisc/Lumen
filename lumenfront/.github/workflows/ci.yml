name: aiofront CI

on:
  push:
    paths: ["aiofront/**", "packages/**"]
  pull_request:
    paths: ["aiofront/**", "packages/**"]

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace=aiofront
      - run: npm run lint --workspace=aiofront
      - run: npm run test --workspace=aiofront
      - run: npm run build --workspace=aiofront
