name: CI — lumenmobile

on:
  push:
    paths:
      - "lumenmobile/**"
      - ".github/workflows/lumenmobile.yml"
  pull_request:
    paths:
      - "lumenmobile/**"
      - ".github/workflows/lumenmobile.yml"

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lumenmobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-android:
    name: Build Android debug APK
    runs-on: ubuntu-latest
    needs: analyze-test
    defaults:
      run:
        working-directory: lumenmobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: lumenmobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
