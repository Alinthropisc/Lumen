name: CI — root

on:
  push:
    paths:
      - "packages/**"
      - "package.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - ".github/workflows/ci.yml"

jobs:
  packages:
    name: Lint, typecheck & test shared packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
