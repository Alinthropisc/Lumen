name: CI — lumenfront

on:
  push:
    paths:
      - "lumenfront/**"
      - "packages/**"
      - ".github/workflows/lumenfront.yml"
  pull_request:
    paths:
      - "lumenfront/**"
      - "packages/**"
      - ".github/workflows/lumenfront.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=lumenfront --if-present

      - name: Test
        run: npm run test --workspace=lumenfront --if-present

      - name: Build
        run: npm run build --workspace=lumenfront --if-present
