name: lumenmobile
description: "Aio Mobile — Flutter starter kit"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Network
  dio: ^5.8.0+1

  # Dependency injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # State persistence
  hydrated_bloc: ^11.0.0
  path_provider: ^2.1.5

  # Connectivity
  connectivity_plus: ^6.1.4

  # Utils
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  logger: ^2.5.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  injectable_generator: ^2.7.0
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
